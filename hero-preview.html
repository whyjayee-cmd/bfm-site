<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BfM 히어로 프리뷰 — sui.io 무드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --ink:#eef2fb; --mut:#9db0d6; --accent:#5b8def; --accent-lite:#8fb6ff;
  }
  html,body{background:#05060c;color:var(--ink);font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}

  /* ===== HERO ===== */
  .hero{
    position:relative; min-height:100svh; overflow:hidden;
    display:flex; align-items:center;
    padding:96px 6vw 64px;
    background:
      radial-gradient(72% 56% at 74% 30%, rgba(90,150,255,.34), transparent 66%),
      radial-gradient(90% 70% at 12% 8%, rgba(40,70,150,.30), transparent 60%),
      linear-gradient(168deg,#05060c 0%,#0a1730 30%,#103069 60%,#1a4fb8 100%);
  }
  /* sui식 세로 라이트바 — 아주 은은하게 */
  .hero::before{
    content:""; position:absolute; inset:-10% -20%; z-index:0; pointer-events:none;
    background:repeating-linear-gradient(90deg, rgba(180,210,255,.055) 0 1px, transparent 1px 15px);
    -webkit-mask-image:radial-gradient(70% 80% at 60% 40%, #000 30%, transparent 78%);
            mask-image:radial-gradient(70% 80% at 60% 40%, #000 30%, transparent 78%);
    filter:blur(.4px);
    animation:barsDrift 26s linear infinite;
  }
  @keyframes barsDrift{to{transform:translateX(15px)}}
  /* 상단 미묘한 비네트 */
  .hero::after{
    content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(3,4,10,.55) 0%, transparent 22%, transparent 74%, rgba(3,4,10,.35) 100%);
  }

  .wrap{position:relative; z-index:2; width:100%; max-width:1220px; margin:0 auto;
    display:grid; grid-template-columns:1.12fr .88fr; align-items:center; gap:36px}

  /* ===== 좌측 텍스트 ===== */
  .eb{display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600;
    letter-spacing:.08em; color:var(--accent-lite);
    opacity:0; animation:rise .8s cubic-bezier(.16,.84,.32,1) .15s both}
  .eb .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-lite);box-shadow:0 0 12px var(--accent-lite)}

  h1{margin:18px 0 0; font-weight:650; font-size:clamp(40px,5.8vw,74px); line-height:1.06;
    letter-spacing:-.035em; color:#fff;
    text-shadow:0 0 42px rgba(120,170,255,.35);
    animation:focusIn 1.25s cubic-bezier(.2,.7,.2,1) .1s both}
  h1 .soft{color:#c9d8ff; text-shadow:0 0 34px rgba(120,170,255,.75), 0 0 8px rgba(120,170,255,.5)}
  h1 .accent{color:#fff}
  h1 .accent::after{content:""; display:block}

  /* 시그니처: 블러→선명 포커스인 */
  @keyframes focusIn{
    0%{filter:blur(16px); opacity:0; letter-spacing:.01em; transform:translateY(10px)}
    60%{opacity:1}
    100%{filter:blur(0); opacity:1; letter-spacing:-.035em; transform:none}
  }

  .sub{margin-top:22px; font-size:clamp(15px,1.5vw,18px); line-height:1.65; color:var(--mut); max-width:36ch;
    opacity:0; animation:rise .9s cubic-bezier(.16,.84,.32,1) .5s both}

  .mini{margin-top:22px; display:flex; flex-wrap:wrap; gap:8px 16px;
    opacity:0; animation:rise .9s cubic-bezier(.16,.84,.32,1) .62s both}
  .mini span{font-size:13.5px; color:#bccbe8; display:inline-flex; align-items:center; gap:6px}
  .mini span::before{content:"✓"; color:var(--accent-lite); font-weight:700}

  .cta{margin-top:34px; display:flex; flex-wrap:wrap; gap:12px;
    opacity:0; animation:rise .9s cubic-bezier(.16,.84,.32,1) .74s both}
  .btn{display:inline-flex; align-items:center; gap:8px; font:inherit; font-size:15.5px; font-weight:600;
    padding:16px 26px; border-radius:6px; cursor:pointer; border:1px solid transparent; text-decoration:none;
    transition:transform .18s ease, box-shadow .25s ease, background .2s}
  .btn.primary{background:var(--accent); color:#fff; box-shadow:0 14px 34px -12px rgba(91,141,239,.9)}
  .btn.primary:hover{transform:translateY(-2px); box-shadow:0 20px 44px -12px rgba(91,141,239,1)}
  .btn.ghost{background:rgba(255,255,255,.04); color:#fff; border-color:rgba(174,200,255,.35); backdrop-filter:blur(4px)}
  .btn.ghost:hover{background:rgba(255,255,255,.1); transform:translateY(-2px)}

  /* ===== 우측 제품 ===== */
  .prod{position:relative; display:flex; align-items:center; justify-content:center;
    opacity:0; animation:rise 1.1s cubic-bezier(.16,.84,.32,1) .45s both}
  .prod .glow{position:absolute; width:74%; aspect-ratio:1; border-radius:50%;
    background:radial-gradient(circle, rgba(120,165,255,.6), rgba(80,130,255,.15) 45%, transparent 70%);
    filter:blur(26px); animation:pulse 7s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}
  .prod img{position:relative; z-index:1; width:min(360px,74%); height:auto;
    filter:drop-shadow(0 40px 60px rgba(0,0,0,.55));
    animation:float 6s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .badge{position:absolute; top:8%; left:2%; z-index:2; font-size:13px; font-weight:600;
    padding:8px 15px; border-radius:999px; color:#eaf1ff;
    background:rgba(12,22,48,.72); border:1px solid rgba(150,185,255,.4); backdrop-filter:blur(8px);
    box-shadow:0 8px 24px -8px rgba(0,0,0,.6)}

  @keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

  /* ===== 모바일 (주력) ===== */
  @media (max-width:820px){
    .hero{padding:88px 24px 56px; align-items:flex-start}
    .wrap{grid-template-columns:1fr; gap:8px; text-align:center; max-width:520px}
    .eb{justify-content:center}
    h1{font-size:clamp(34px,10vw,52px)}
    .sub{margin-left:auto;margin-right:auto}
    .mini{justify-content:center}
    .cta{justify-content:center}
    .prod{order:-1; margin-bottom:6px}
    .prod img{width:min(230px,62%)}
    .badge{left:auto; right:6%}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important}
    h1{filter:none;opacity:1}
  }

  /* 프리뷰 라벨 */
  .peek{position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:9;
    font-size:12px; color:#aebbd8; background:rgba(8,12,24,.7); border:1px solid rgba(150,185,255,.25);
    padding:7px 14px; border-radius:999px; backdrop-filter:blur(6px)}
</style>
</head>
<body>
  <section class="hero">
    <div class="wrap">
      <div class="col-text">
        <span class="eb"><span class="dot"></span>효율적인 남자를 위한 맞춤 스킨케어</span>
        <h1><span class="soft">고민 할 필요 없이,</span><br><span class="accent">나에게 딱 맞는 한 병.</span></h1>
        <p class="sub">AI가 피부 타입을 분석해<br>당신의 피부에 필요한 성분을 한 병에 담습니다.</p>
        <div class="mini"><span>토너·로션·세럼 올인원</span><span>불만족 시 무료 교체</span><span>성분·함량 공개</span></div>
        <div class="cta">
          <a class="btn primary" href="#">피부타입에 맞는 올인원 구매하기</a>
          <a class="btn ghost" href="#">30초 무료 피부 진단 →</a>
        </div>
      </div>
      <div class="prod">
        <div class="glow"></div>
        <span class="badge">4-in-1 올인원</span>
        <img src="hero-preview-bottle.webp" alt="BfM">
      </div>
    </div>
  </section>
  <div class="peek">프리뷰 · sui.io 무드 적용안 (라이브 아님)</div>
</body>
</html>
